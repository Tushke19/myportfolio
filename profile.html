<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS — Edit Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">

  <nav class="navbar app-navbar">
    <a class="brand" href="dashboard.html">LMS</a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="my-books.html">My Books</a>
      <a href="profile.html" class="active">Profile</a>
      <a href="#" id="logoutBtn" class="logout-link">Logout</a>
    </div>
  </nav>

  <main class="app-main">
    <div class="app-header">
      <h1>Edit Profile</h1>
      <p class="app-subtitle">Update your account information.</p>
    </div>

    <div class="section-card narrow-card">
      <div id="profileMsg" class="msg-box hidden"></div>
      <form id="profileForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="pName" required>
        </div>
        <div class="form-group">
          <label>Email Address <span class="hint">(cannot be changed)</span></label>
          <input type="email" id="pEmail" disabled>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="tel" id="pMobile" required>
        </div>
        <div class="form-group">
          <label>Address</label>
          <textarea id="pAddress" rows="3"></textarea>
        </div>
        <button type="submit" class="btn-primary">Save Changes</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    requireLogin();
    const user = lms.getCurrentUser();
    document.getElementById('pName').value    = user.name;
    document.getElementById('pEmail').value   = user.email;
    document.getElementById('pMobile').value  = user.mobile || '';
    document.getElementById('pAddress').value = user.address || '';

    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const result = lms.updateProfile({
        name:    document.getElementById('pName').value.trim(),
        mobile:  document.getElementById('pMobile').value.trim(),
        address: document.getElementById('pAddress').value.trim(),
      });
      showMsg('profileMsg', result.message, result.success ? 'success' : 'error');
    });

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault(); lms.logout(); window.location.href = 'lms.html';
    });
  </script>
</body>
</html>
