<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS — Change Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="app-page">

  <nav class="navbar app-navbar">
    <a class="brand" href="dashboard.html">LMS</a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="my-books.html">My Books</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutBtn" class="logout-link">Logout</a>
    </div>
  </nav>

  <main class="app-main">
    <div class="app-header">
      <h1>Change Password</h1>
      <p class="app-subtitle">Keep your account secure with a strong password.</p>
    </div>

    <div class="section-card narrow-card">
      <div id="pwMsg" class="msg-box hidden"></div>
      <form id="pwForm">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" id="oldPw" placeholder="Your current password" required>
        </div>
        <div class="form-group">
          <label>New Password <span class="hint">(min. 6 characters)</span></label>
          <input type="password" id="newPw" placeholder="New password" minlength="6" required>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" id="confirmPw" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn-primary">Update Password</button>
      </form>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    requireLogin();

    document.getElementById('pwForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const oldPw     = document.getElementById('oldPw').value;
      const newPw     = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;

      if (newPw !== confirmPw) {
        return showMsg('pwMsg', 'New passwords do not match.', 'error');
      }
      if (newPw.length < 6) {
        return showMsg('pwMsg', 'Password must be at least 6 characters.', 'error');
      }

      const result = lms.changePassword(oldPw, newPw);
      showMsg('pwMsg', result.message, result.success ? 'success' : 'error');
      if (result.success) document.getElementById('pwForm').reset();
    });

    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault(); lms.logout(); window.location.href = 'lms.html';
    });
  </script>
</body>
</html>
